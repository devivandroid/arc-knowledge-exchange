services:
  postgres:
    image: postgres:16
    container_name: kx-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: knowledge_exchange
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - kx-platform-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d knowledge_exchange"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kx-platform-pgdata:

